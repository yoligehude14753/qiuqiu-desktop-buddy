<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
  html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:-apple-system,"PingFang SC",sans-serif}
  #stage{position:absolute;inset:0;-webkit-app-region:drag}

  /* 工具条 */
  #bar{position:absolute;top:0;right:0;left:0;display:flex;align-items:center;gap:5px;padding:6px 8px;opacity:0.4;transition:.2s;z-index:30}
  #stage:hover #bar{opacity:1}
  #bar .sp{flex:1}
  .btn{-webkit-app-region:no-drag;min-width:18px;height:18px;border-radius:9px;cursor:pointer;border:none;font-size:10px;color:#fff;line-height:18px;text-align:center;padding:0 5px}
  .btn.play{background:#2ea043}.btn.pause{background:#bb8009}.btn.close{background:#da3633}
  .btn.tool{background:rgba(0,0,0,.55)}
  #team{-webkit-app-region:no-drag;font-size:11px;border:none;border-radius:9px;background:rgba(0,0,0,.55);color:#fff;padding:2px 4px;cursor:pointer}

  #wcbadge{position:absolute;top:6px;left:10px;font-size:11px;font-weight:800;color:#ffd24a;text-shadow:0 1px 3px rgba(0,0,0,.7);z-index:9;pointer-events:none}

  #bubble{position:absolute;top:24px;left:10px;right:10px;background:linear-gradient(135deg,rgba(193,18,31,.95),rgba(46,160,67,.95));color:#fff;border-radius:14px;padding:9px 13px;font-size:15px;line-height:1.4;box-shadow:0 6px 24px rgba(0,0,0,.4);opacity:0;transform:translateY(-6px);transition:.25s;pointer-events:none;border:1px solid rgba(255,255,255,.15);z-index:15}
  #bubble.show{opacity:1;transform:translateY(0)}
  #bubble .nm{font-size:11px;color:#ffe08a;font-weight:700;margin-bottom:2px}
  #bubble::after{content:"";position:absolute;bottom:-7px;left:46px;border:7px solid transparent;border-top-color:rgba(46,160,67,.95);border-bottom:0}

  #charwrap{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:78%;display:flex;align-items:flex-end;justify-content:center;z-index:8}
  /* 待机:呼吸 + 极轻微左右摇摆,更自然 */
  #char{height:100%;object-fit:contain;filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));transform-origin:bottom center;animation:breathe 3.4s ease-in-out infinite, sway 6s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.012)}}
  @keyframes sway{0%,100%{margin-left:-3px;rotate:-1deg}50%{margin-left:3px;rotate:1deg}}
  #char.talking{animation:talk .32s ease-in-out infinite, sway 6s ease-in-out infinite}
  @keyframes talk{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px) scale(1.006)}}
  #char.jump{animation:jump .7s cubic-bezier(.3,1.4,.5,1)}
  @keyframes jump{0%{transform:translateY(0)}25%{transform:translateY(-30px) scale(1.06) rotate(-3deg)}55%{transform:translateY(-8px) rotate(2deg)}100%{transform:translateY(0)}}
  #char.bounce{animation:bounce .6s ease-out 2}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px) scale(1.03)}}
  #char.lean{animation:lean .8s ease-in-out}
  @keyframes lean{0%{transform:rotate(0)}30%{transform:rotate(-5deg) translateX(-4px)}100%{transform:rotate(0)}}
  #char.wave{animation:wavea 1s ease-in-out}
  @keyframes wavea{0%,100%{transform:rotate(0)}25%{transform:rotate(4deg)}75%{transform:rotate(-4deg)}}

  #ball{position:absolute;left:14px;bottom:40px;font-size:30px;z-index:9;pointer-events:none;will-change:transform}
  #goal{position:absolute;inset:0;display:none;align-items:flex-start;justify-content:center;padding-top:80px;z-index:20;pointer-events:none}
  #goal .txt{font-size:42px;font-weight:900;color:#ffd24a;-webkit-text-stroke:2px #c1121f;text-shadow:0 4px 12px rgba(0,0,0,.5);animation:pop .5s ease-out}
  @keyframes pop{0%{transform:scale(.2);opacity:0}50%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
  .confetti{position:absolute;width:8px;height:8px;top:-10px;z-index:19;pointer-events:none}
  #status{position:absolute;bottom:3px;right:8px;font-size:9px;color:rgba(255,255,255,.4);z-index:9}

  /* 面板(设置/历史/统计) */
  .panel{-webkit-app-region:no-drag;position:absolute;top:28px;left:8px;right:8px;bottom:8px;
         background:rgba(13,17,23,.97);border:1px solid #30363d;border-radius:12px;padding:12px;
         z-index:40;display:none;flex-direction:column;color:#e6edf3;font-size:13px}
  .panel.show{display:flex}
  .panel h3{font-size:14px;margin-bottom:8px;color:#ffd24a;display:flex;justify-content:space-between}
  .panel h3 .x{cursor:pointer;color:#7d8590}
  .row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #21262d}
  .row label{color:#adbac7}
  .row input[type=range]{width:110px}
  .panel .list{overflow-y:auto;flex:1}
  .panel .item{padding:6px 0;border-bottom:1px solid #21262d;line-height:1.4}
  .panel .item .t{font-size:10px;color:#7d8590}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .stat-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px;text-align:center}
  .stat-card .v{font-size:22px;font-weight:800;color:#2ea043}
  .stat-card .k{font-size:11px;color:#7d8590;margin-top:2px}
  .seg{display:flex;gap:6px}.seg button{flex:1;background:#21262d;border:1px solid #30363d;color:#adbac7;border-radius:8px;padding:5px;cursor:pointer;font-size:12px}
  .seg button.on{background:#1f6feb;color:#fff;border-color:#1f6feb}
  .keybox{display:flex;flex-direction:column;gap:6px;padding:7px 0;border-bottom:1px solid #21262d}
  .keybox label{color:#adbac7}
  .keybox input{-webkit-app-region:no-drag;width:100%;border:1px solid #30363d;background:#0d1117;color:#e6edf3;border-radius:8px;padding:7px;font-size:12px}
  .key-actions{display:flex;gap:6px;align-items:center}
  .key-actions button{-webkit-app-region:no-drag;background:#238636;border:1px solid #2ea043;color:#fff;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:12px}
  .key-actions button.secondary{background:#21262d;border-color:#30363d;color:#adbac7}
  #keyStatus{font-size:11px;color:#7d8590}
</style>
</head>
<body>
<div id="stage">
  <div id="bar">
    <select id="team" title="选主队">
      <option value="default">日常模式</option>
      <option value="argentina">🇦🇷 阿根廷</option>
      <option value="brazil">🇧🇷 巴西</option>
    </select>
    <span class="sp"></span>
    <button class="btn tool" id="settingsBtn" title="设置">⚙</button>
    <button class="btn tool" id="histBtn" title="历史/数据">📊</button>
    <button class="btn tool" id="passBtn" title="鼠标穿透 Cmd+Shift+K">🖱</button>
    <button class="btn play" id="toggle" title="开始/暂停">▶</button>
    <button class="btn close" id="close" title="关闭">✕</button>
  </div>
  <div id="wcbadge">球球 · 电脑搭子</div>
  <div id="bubble"><div class="nm">球球</div><div id="btext"></div></div>
  <div id="charwrap"><img id="char" src="models/fan_calm.png"/></div>
  <canvas id="live2d" style="position:absolute;inset:0;width:100%;height:100%;z-index:8;display:none;pointer-events:none"></canvas>
  <div id="ball">⚽</div>
  <div id="goal"><div class="txt">GOAL!!!</div></div>
  <div id="status"></div>

  <!-- 设置面板 -->
  <div class="panel" id="settingsPanel">
    <h3>设置 <span class="x" data-close="settingsPanel">✕</span></h3>
    <div class="row"><label>人设</label>
      <select id="persona">
        <option value="beijing">北京老炮儿</option>
        <option value="shanghai">上海爷叔</option>
        <option value="shandong">山东大汉</option>
        <option value="dongbei">东北老铁</option>
      </select></div>
    <div class="row"><label>看屏模型</label>
      <select id="visionProvider">
        <option value="qwen3">Qwen3-VL（内置·免Key）</option>
        <option value="k2.6">Kimi K2.6（需自带Key）</option>
      </select></div>
    <div class="keybox">
      <label>Kimi API Key（仅 K2.6 需要）</label>
      <input id="kimiKey" type="password" placeholder="选 K2.6 时填入你的 Kimi Key"/>
      <div class="key-actions">
        <button id="saveKey">保存</button>
        <button class="secondary" id="testKey">测试</button>
        <span id="keyStatus">未检测</span>
      </div>
    </div>
    <div class="row"><label>看屏频率</label>
      <div class="seg" id="intervalSeg">
        <button data-v="3000">3秒</button><button data-v="5000">5秒</button><button data-v="8000">8秒</button>
      </div></div>
    <div class="row"><label>音量</label><input type="range" id="vol" min="0" max="100" value="90"/></div>
    <div class="row"><label>静音</label><input type="checkbox" id="mute"/></div>
    <div class="row"><label>启动即自动陪看</label><input type="checkbox" id="auto" checked/></div>
    <div class="row"><label>语音播报</label><input type="checkbox" id="speak" checked/></div>
    <div class="row"><label>系统语音</label><button class="btn tool" id="voiceTest" style="height:24px;min-width:52px">试音</button></div>
    <div class="row"><label>版本</label><span id="appVer" style="color:#7d8590;font-size:12px">-</span></div>
    <div class="row"><label>形象</label>
      <div class="seg" id="runtimeSeg">
        <button data-v="sprite">日常静图</button><button data-v="live2d">Live2D版</button>
      </div></div>
  </div>

  <!-- 历史/统计面板 -->
  <div class="panel" id="histPanel">
    <h3>陪伴数据 <span class="x" data-close="histPanel">✕</span></h3>
    <div class="stat-grid" id="statGrid"></div>
    <div style="font-size:11px;color:#7d8590;margin-bottom:4px">最近解说</div>
    <div class="list" id="histList"></div>
  </div>
</div>
<audio id="player"></audio>
<script src="lib/live2dcubismcore.min.js"></script>
<script src="lib/pixi.min.js"></script>
<script src="lib/cubism4.min.js"></script>
<script src="live2d-runtime.js"></script>
<script src="rig-runtime.js"></script>
<script src="app.js"></script>
</body>
</html>
